# ─── Nginx конфиг для HP Тюнинг — hptuning.ru ────────────────────────────────
# Сервер: Selectel VPS (Ubuntu 22.04 LTS)
# Node.js: v20 LTS (Next.js standalone)
# Certbot/Let's Encrypt: SSL

# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hptuning.ru www.hptuning.ru hp-tuning.ru www.hp-tuning.ru;
    return 301 https://hptuning.ru$request_uri;
}

# ─── Redirect www и hp-tuning.ru → hptuning.ru (HTTPS) ───────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hptuning.ru hp-tuning.ru www.hp-tuning.ru;

    ssl_certificate /etc/letsencrypt/live/hptuning.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hptuning.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://hptuning.ru$request_uri;
}

# ─── Основной сервер hptuning.ru ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hptuning.ru;

    ssl_certificate /etc/letsencrypt/live/hptuning.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hptuning.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Логи ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/hptuning.access.log;
    error_log  /var/log/nginx/hptuning.error.log;

    # ─── Базовые настройки ────────────────────────────────────────────────────
    root /var/www/hptuning;
    index index.html;
    charset utf-8;

    # ─── Gzip сжатие ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/woff2;

    # ─── Статические ассеты Next.js (_next/static) ────────────────────────────
    location /_next/static/ {
        alias /var/www/hptuning/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # ─── Шрифты ───────────────────────────────────────────────────────────────
    location /fonts/ {
        alias /var/www/hptuning/public/fonts/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        expires 1y;
        access_log off;
    }

    # ─── Изображения ──────────────────────────────────────────────────────────
    location /images/ {
        alias /var/www/hptuning/public/images/;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
        expires 1d;
        access_log off;
    }

    # ─── robots.txt, sitemap.xml, favicon ─────────────────────────────────────
    location = /robots.txt  { alias /var/www/hptuning/public/robots.txt;  access_log off; }
    location = /sitemap.xml { alias /var/www/hptuning/public/sitemap.xml; access_log off; }
    location = /sitemap-0.xml { alias /var/www/hptuning/public/sitemap-0.xml; access_log off; }
    location = /favicon.ico { alias /var/www/hptuning/public/favicon.ico; access_log off; }

    # ─── Next.js приложение (через Node.js на порту 3000) ─────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Скрыть версию Nginx ──────────────────────────────────────────────────
    server_tokens off;
}
