# ╔══════════════════════════════════════════════╗
# ║       HP ТЮНИНГ — Netlify конфиг             ║
# ║       Статический многостраничный сайт       ║
# ╚══════════════════════════════════════════════╝

[build]
  # Нет сборки — чистая статика, публикуем папку как есть
  publish = "."

# ── Заголовки безопасности для всех страниц ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com https://online.autodealer.ru https://yandex.ru https://mc.yandex.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; frame-src https://yandex.ru https://online.autodealer.ru; connect-src 'self' https:; media-src 'self' https: blob:; object-src 'none'; base-uri 'self'; form-action 'self' https:; upgrade-insecure-requests;"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ── HTML страницы — короткий кэш (контент меняется) ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=300, stale-while-revalidate=600"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=300, stale-while-revalidate=600"

# ── JS и CSS — длинный кэш (immutable) ──
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# ── Картинки — длинный кэш ──
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# ── Служебные файлы ──
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
