# ═══════════════════════════════════════════════════════════════
# HP ТЮНИНГ — nginx конфиг
# Домен: hptuning.ru + 8 брендовых субдоменов
# VPS: 87.228.63.177 | Next.js: 127.0.0.1:3000
# Basic Auth: hptuning / HP75457545 (пока в разработке)
# Все субдомены проксируются в тот же Next.js процесс.
# Host header передаётся AS-IS → middleware.ts читает и роутит.
# ═══════════════════════════════════════════════════════════════

# ── Upstream — Next.js (один процесс, все домены) ─────────────
upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ═══════════════════════════════════════════════════════════════
# HTTP → HTTPS для основного домена и всех субдоменов
# ═══════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name hptuning.ru www.hptuning.ru
                bmw.hptuning.ru mercedes.hptuning.ru audi.hptuning.ru
                porsche.hptuning.ru volkswagen.hptuning.ru toyota.hptuning.ru
                lexus.hptuning.ru landrover.hptuning.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════════════════════════
# www → без www
# ═══════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hptuning.ru;

    ssl_certificate     /etc/letsencrypt/live/hptuning.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hptuning.ru/privkey.pem;

    return 301 https://hptuning.ru$request_uri;
}

# ═══════════════════════════════════════════════════════════════
# Основной домен hptuning.ru
# ═══════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hptuning.ru;

    ssl_certificate     /etc/letsencrypt/live/hptuning.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hptuning.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ПОКА В РАЗРАБОТКЕ: noindex — УБРАТЬ перед публикацией!
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Basic Auth — УБРАТЬ перед публикацией!
    auth_basic           "HP Тюнинг — закрытый доступ";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Исключения из Basic Auth
    location = /robots.txt {
        auth_basic off;
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
    }
    location = /yandex_612ea2d0128620d8.html {
        auth_basic off;
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
    }
    location /sitemap {
        auth_basic off;
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
    }

    # Статика — длинный кэш
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
    location /images/ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Основной прокси
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/hptuning.access.log;
    error_log  /var/log/nginx/hptuning.error.log warn;
}

# ═══════════════════════════════════════════════════════════════
# Брендовые субдомены — ОБЩИЙ БЛОК
# Все 8 субдоменов → один Next.js, Host header передаётся as-is.
# middleware.ts читает Host и делает rewrite на /brands/:slug.
# ═══════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bmw.hptuning.ru mercedes.hptuning.ru audi.hptuning.ru
                porsche.hptuning.ru volkswagen.hptuning.ru toyota.hptuning.ru
                lexus.hptuning.ru landrover.hptuning.ru;

    # Wildcard SSL сертификат *.hptuning.ru
    # Получить: certbot certonly --manual --preferred-challenges dns -d *.hptuning.ru
    # Или отдельные сертификаты для каждого субдомена (см. 05-add-subdomain.sh)
    ssl_certificate     /etc/letsencrypt/live/hptuning.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hptuning.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ПОКА В РАЗРАБОТКЕ: noindex — УБРАТЬ перед публикацией!
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Basic Auth — УБРАТЬ перед публикацией!
    auth_basic           "HP Тюнинг — закрытый доступ";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Исключения
    location = /robots.txt {
        auth_basic off;
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
    }

    # Статика
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # КЛЮЧЕВОЕ: передаём $host AS-IS → middleware.ts читает и роутит на нужный бренд
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;         # ← bmw.hptuning.ru передаётся в Node
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/brands.hptuning.access.log;
    error_log  /var/log/nginx/brands.hptuning.error.log warn;
}
