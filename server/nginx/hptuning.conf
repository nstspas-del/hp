    server_name bmw.hptuning.ru mercedes.hptuning.ru audi.hptuning.ru
                porsche.hptuning.ru volkswagen.hptuning.ru toyota.hptuning.ru
                lexus.hptuning.ru landrover.hptuning.ru;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / {
        # Brand subdomain: rewrite корня на /brands/{slug}
        rewrite ^/$ /brands/$brand_slug last;
 return 301 https://$host$request_uri; }
}
