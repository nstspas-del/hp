# HP ТЮНИНГ — nginx конфиг
# Домен: hptuning.ru  |  VPS: 87.228.63.177
# Next.js слушает на 127.0.0.1:3000
# Basic Auth — пока сайт в разработке (noindex)
# ═══════════════════════════════════════════════════════════════

# ── Upstream — Next.js ────────────────────────────────────────

# Map: hostname → brand slug (для rewrite на /brands/{slug})
map $host $brand_slug {
    default                         "";
    bmw.hptuning.ru                 "bmw";
    mercedes.hptuning.ru            "mercedes";
    audi.hptuning.ru                "audi";
    porsche.hptuning.ru             "porsche";
    volkswagen.hptuning.ru          "volkswagen";
    toyota.hptuning.ru              "toyota";
    lexus.hptuning.ru               "lexus";
    landrover.hptuning.ru           "landrover";
}


# Map: slug → subdomain URL (для 301 редиректа /brands/{slug} → {slug}.hptuning.ru)
map $brand_legacy_slug $brand_legacy_redirect {
    default                 "";
    bmw                     "https://bmw.hptuning.ru/";
    mercedes                "https://mercedes.hptuning.ru/";
    audi                    "https://audi.hptuning.ru/";
    porsche                 "https://porsche.hptuning.ru/";
    volkswagen              "https://volkswagen.hptuning.ru/";
    toyota                  "https://toyota.hptuning.ru/";
    lexus                   "https://lexus.hptuning.ru/";
    landrover               "https://landrover.hptuning.ru/";
    "land-rover"            "https://landrover.hptuning.ru/";
}

upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS редирект ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hptuning.ru www.hptuning.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://hptuning.ru$request_uri;
    }
}

# ── www → без www ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hptuning.ru;

    ssl_certificate     /etc/letsencrypt/live/hptuning.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hptuning.ru/privkey.pem;

    return 301 https://hptuning.ru$request_uri;
}

# ── Основной HTTPS блок ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hptuning.ru;


    # Legacy редирект /brands/{slug} → {slug}.hptuning.ru — ВЫСШИЙ ПРИОРИТЕТ
    location ~* ^/brands/(bmw|mercedes|audi|porsche|volkswagen|toyota|lexus|landrover|land-rover)/?$ {
        set $brand_legacy_slug $1;
        if ($brand_legacy_slug = "land-rover") {
            set $brand_legacy_slug "landrover";
        }
        return 301 $brand_legacy_redirect;
    }

    # SSL (certbot заполнит)
    ssl_certificate     /etc/letsencrypt/live/hptuning.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hptuning.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Заголовки безопасности ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── ПОКА В РАЗРАБОТКЕ: noindex ────────────────────────────
    # УБРАТЬ эту строку когда сайт готов к индексации!
    add_header X-Robots-Tag "noindex, nofollow" always;

    # ── Basic Auth (пока в разработке) ────────────────────────
    # УБРАТЬ auth_basic блок когда готовы к публикации
    auth_basic           "HP Тюнинг — закрытый доступ";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Исключения из Basic Auth ──────────────────────────────
    # Яндекс.Метрика и ботам — открытый доступ к robots.txt и sitemap
    location = /robots.txt {
        auth_basic off;
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
    }

    location = /yandex_612ea2d0128620d8.html {
        auth_basic off;
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
    }

    # ── Статика Next.js — длинный кэш ─────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Основной проксируем в Next.js ─────────────────────────
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Логи ──────────────────────────────────────────────────
    access_log /var/log/nginx/hptuning.access.log;
    error_log  /var/log/nginx/hptuning.error.log warn;
}

# ═══════════════════════════════════════════════════════════════
# Брендовые поддомены — rewrite через Next.js middleware
# ═══════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bmw.hptuning.ru mercedes.hptuning.ru audi.hptuning.ru
                porsche.hptuning.ru volkswagen.hptuning.ru toyota.hptuning.ru
                lexus.hptuning.ru landrover.hptuning.ru;

    ssl_certificate     /etc/letsencrypt/live/hptuning.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hptuning.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    auth_basic           "HP Тюнинг — закрытый доступ";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location = /robots.txt {
        auth_basic off;
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
    }

    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        # Brand subdomain: rewrite корня на /brands/{slug}
        rewrite ^/$ /brands/$brand_slug last;

        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/brands.access.log;
    error_log  /var/log/nginx/brands.error.log warn;
}

