# ═══════════════════════════════════════════════════════════════
# HP ТЮНИНГ — Шаблон nginx для поддоменов
# Заменить BRAND на: bmw / mercedes / audi / porsche / vw / toyota / lexus / landrover
# Пример: cp subdomain-template.conf bmw.hptuning.ru.conf
#         sed -i 's/BRAND/bmw/g' bmw.hptuning.ru.conf
# ═══════════════════════════════════════════════════════════════

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name BRAND.hptuning.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://BRAND.hptuning.ru$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name BRAND.hptuning.ru;

    ssl_certificate     /etc/letsencrypt/live/BRAND.hptuning.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/BRAND.hptuning.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ПОКА В РАЗРАБОТКЕ: noindex + Basic Auth
    add_header X-Robots-Tag "noindex, nofollow" always;
    auth_basic           "HP Тюнинг BRAND — закрытый доступ";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Статика
    location /_next/static/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
        access_log off;
    }

    # Прокси в Next.js
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/BRAND.hptuning.access.log;
    error_log  /var/log/nginx/BRAND.hptuning.error.log warn;
}
